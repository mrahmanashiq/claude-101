# Learn Claude — course manifest
# Source layout: _md/<lang>/<slug>/NN-*.md
# Each course is built once per language declared below.

languages:
  - code: en
    label: English
    alt_label: বাংলা
    dir: ltr
  - code: bn
    label: বাংলা
    alt_label: English
    dir: ltr

courses:
  - slug: fundamentals
    order: 1
    titles:
      en: Fundamentals
      bn: মৌলিক বিষয়
    descriptions:
      en: Start here. What Claude is, how the models differ, how to prompt well, and the mental model you need before building anything.
      bn: শুরু এখান থেকে। Claude আসলে কী, মডেলগুলো কীভাবে আলাদা, কীভাবে ভালো prompt লিখবেন, এবং কিছু বানানোর আগে যে মানসিক কাঠামো দরকার।

  - slug: claude-code
    order: 2
    titles:
      en: Claude Code
      bn: Claude Code
    descriptions:
      en: The CLI tool. Sessions, slash commands, tools, CLAUDE.md, skills, subagents, hooks, MCP servers — everything you need to ship with an agentic coding workflow.
      bn: CLI টুল। Sessions, slash commands, tools, CLAUDE.md, skills, subagents, hooks, MCP servers — agentic coding workflow দিয়ে ship করার জন্য যা যা দরকার।

  - slug: claude-api
    order: 3
    titles:
      en: Claude API & SDK
      bn: Claude API ও SDK
    descriptions:
      en: Build apps with the Claude API. Messages, tool use, streaming, prompt caching, extended thinking, files & vision, and batch.
      bn: Claude API দিয়ে app বানান। Messages, tool use, streaming, prompt caching, extended thinking, files ও vision, এবং batch।

  - slug: advanced-patterns
    order: 4
    titles:
      en: Advanced Patterns
      bn: অ্যাডভান্সড প্যাটার্ন
    descriptions:
      en: Agent loops, multi-step workflows, subagent orchestration, building your own MCP servers, evals, production readiness, and cost optimization.
      bn: Agent loops, multi-step workflows, subagent orchestration, নিজের MCP server বানানো, evals, production readiness, এবং cost optimization।

