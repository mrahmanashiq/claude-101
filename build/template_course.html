<!DOCTYPE html>
<html lang="{{lang}}" dir="{{dir}}" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{course_title}} — {{site_name}}</title>
  <link rel="icon" type="image/svg+xml" href="{{base_path}}assets/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="{{base_path}}assets/favicon-32.png">
  <link rel="alternate icon" href="{{base_path}}assets/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="{{base_path}}assets/apple-touch-icon.png">
  <meta name="theme-color" content="#cc7752" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#e89164" media="(prefers-color-scheme: dark)">
  <link rel="stylesheet" href="{{base_path}}assets/styles.css">
</head>
<body>
  <div class="promo-strip">{{promo_strip_text}}</div>
  <header class="site-header">
    <a class="brand" href="{{base_path}}index.html">
      <span class="brand-mark">LC</span>
      <span class="brand-text">{{site_name}}</span>
    </a>
    <nav class="breadcrumb">
      <a href="{{base_path}}index.html">{{home_label}}</a>
      <span class="sep">›</span>
      <span class="current">{{course_title}}</span>
    </nav>
    <a class="lang-toggle" href="{{lang_toggle_href}}" data-action="set-lang">{{lang_toggle_label}}</a>
    <button class="theme-toggle" aria-label="Toggle theme" data-action="toggle-theme">
      <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </header>

  <main class="course-landing">
    <section class="course-hero">
      <span class="course-eyebrow">{{course_label}}</span>
      <h1>{{course_title}}</h1>
      <p class="course-lede">{{course_description}}</p>
      <div class="course-meta">
        <span><strong>{{chapter_count}}</strong> {{chapters_label}}</span>
        <a class="btn-primary" href="{{first_chapter_href}}">{{start_course_label}}</a>
      </div>
    </section>

    <section class="course-progress" data-course-slug="{{course_slug}}" aria-label="Course progress">
      <div class="progress-track" aria-hidden="true"><span class="progress-fill"></span></div>
      <div class="progress-meta">
        <span class="progress-count"><span class="progress-done">0</span> / <span class="progress-total">{{chapter_count}}</span> {{chapters_complete_label}}</span>
        <span class="progress-pct">0%</span>
      </div>
    </section>

    <section class="chapter-grid">
{{chapter_cards}}
    </section>
  </main>

  <script src="{{base_path}}assets/script.js"></script>
</body>
</html>
