<!DOCTYPE html>
<html lang="{{lang}}" dir="{{dir}}" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{chapter_title}} — {{course_title}}</title>
  <link rel="stylesheet" href="{{base_path}}assets/styles.css">
</head>
<body>
  <div class="promo-strip">{{promo_strip_text}}</div>
  <header class="site-header">
    <button class="nav-toggle" aria-label="Toggle sidebar" data-action="toggle-sidebar">
      <span></span><span></span><span></span>
    </button>
    <a class="brand" href="{{base_path}}index.html">
      <span class="brand-mark">LC</span>
      <span class="brand-text">{{site_name}}</span>
    </a>
    <nav class="breadcrumb">
      <a href="{{base_path}}index.html">{{home_label}}</a>
      <span class="sep">›</span>
      <a href="index.html">{{course_title}}</a>
      <span class="sep">›</span>
      <span class="current">{{chapter_title}}</span>
    </nav>
    <a class="lang-toggle" href="{{lang_toggle_href}}" data-action="set-lang">{{lang_toggle_label}}</a>
    <button class="theme-toggle" aria-label="Toggle theme" data-action="toggle-theme">
      <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </header>

  <div class="layout">
    <aside class="sidebar" data-sidebar>
      <div class="sidebar-inner">
        <div class="sidebar-title">
          <span class="sidebar-eyebrow">{{course_label}}</span>
          <a href="index.html">{{course_title}}</a>
        </div>
        <div class="sidebar-progress" aria-label="Course progress">
          <div class="sidebar-progress-text"><span class="progress-done">0</span>/<span class="progress-total">0</span> {{completed_label}}</div>
          <div class="progress-track"><span class="progress-fill"></span></div>
        </div>
        <nav class="sidebar-nav">
          <ol>
{{sidebar_links}}
          </ol>
        </nav>
      </div>
    </aside>

    <main class="article-wrap">
      <article class="article">
        <h1>{{chapter_title}}</h1>
{{chapter_body}}
        <div class="chapter-complete">
          <button class="chapter-complete-btn" type="button" data-action="toggle-chapter-complete" aria-pressed="false">
            <svg class="icon-check" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="12" cy="12" r="9"/>
              <path class="check-mark" d="M8 12l3 3 5-6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="label">{{mark_complete_label}}</span>
          </button>
        </div>
        <nav class="chapter-nav">
{{prev_link}}
{{next_link}}
        </nav>
      </article>
    </main>

    <aside class="toc" data-toc>
      <div class="toc-inner">
        <div class="toc-label">{{on_this_page_label}}</div>
        <ul>
{{toc_links}}
        </ul>
      </div>
    </aside>
  </div>

  <div class="sidebar-backdrop" data-action="close-sidebar"></div>
  <script src="{{base_path}}assets/script.js"></script>
</body>
</html>
